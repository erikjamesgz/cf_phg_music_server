name: Build & Release Bundle

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build JavaScript bundle with esbuild
        run: |
          mkdir -p dist
          npx esbuild src/index.ts \
            --bundle \
            --outdir=dist \
            --platform=browser \
            --format=esm \
            --external:node:* \
            --external:*.wasm

      - name: Prepare distributable bundle
        run: |
          mkdir -p release
          cp dist/index.js release/
          sed 's|main = "src/index.ts"|main = "index.js"|' wrangler.toml > release/wrangler.toml
          cp package.json release/
          tar -czf cf-phg-music-server-bundle.tar.gz release/

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tar -tzf cf-phg-music-server-bundle.tar.gz
          echo "Uploading bundle..."
          gh release create latest \
            --title "Latest Release (自动构建)" \
            --notes "预编译安装包，解压后运行 \`npx wrangler deploy\` 即可部署" \
            cf-phg-music-server-bundle.tar.gz \
            --clobber
